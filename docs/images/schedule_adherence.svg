<svg viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="1" y="1" width="718" height="298" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="36" y="40" font-size="20" font-weight="700" fill="#111827">Agent v3 schedule adherence</text>
  <text x="36" y="62" font-size="13" fill="#6b7280">Journey time over many episodes: mean 46:32, std 6:56. Within a couple of minutes of human-like driving.</text>

  <!-- axis 38..56 min, x = 70 + (min-38)*33.9, baseline y=190 -->
  <line x1="70" y1="190" x2="680" y2="190" stroke="#cbd5e1" stroke-width="1.5"/>
  <g font-size="11" fill="#9ca3af" text-anchor="middle">
    <line x1="137.8" y1="186" x2="137.8" y2="194" stroke="#cbd5e1"/><text x="137.8" y="210">40</text>
    <line x1="273.4" y1="186" x2="273.4" y2="194" stroke="#cbd5e1"/><text x="273.4" y="210">44</text>
    <line x1="409.0" y1="186" x2="409.0" y2="194" stroke="#cbd5e1"/><text x="409.0" y="210">48</text>
    <line x1="544.6" y1="186" x2="544.6" y2="194" stroke="#cbd5e1"/><text x="544.6" y="210">52</text>
    <line x1="680.0" y1="186" x2="680.0" y2="194" stroke="#cbd5e1"/><text x="676" y="210">56</text>
  </g>
  <text x="375" y="238" font-size="12" fill="#6b7280" text-anchor="middle">journey time (minutes)</text>

  <!-- std band: mean 46.53 ± 6.93 -> 39.60 .. 53.47 -->
  <rect x="124.2" y="110" width="470.3" height="80" rx="4" fill="#10b981" opacity="0.14"/>
  <text x="124.2" y="100" font-size="11" fill="#047857">±1 std (39:36 – 53:28)</text>

  <!-- mean marker 46.53 -> x=359.2 -->
  <line x1="359.2" y1="92" x2="359.2" y2="190" stroke="#059669" stroke-width="2.5"/>
  <circle cx="359.2" cy="92" r="4" fill="#059669"/>
  <text x="359.2" y="84" font-size="13" font-weight="700" fill="#047857" text-anchor="middle">mean 46:32</text>

  <!-- reference lines: 85% -> 43.40 -> x=253.1 ; 80% -> 46.10 -> x=344.6 -->
  <line x1="253.1" y1="110" x2="253.1" y2="190" stroke="#3b82f6" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="253.1" y="128" font-size="10.5" fill="#3b82f6" text-anchor="middle">85% limit</text>
  <text x="253.1" y="142" font-size="10.5" fill="#3b82f6" text-anchor="middle">43:24</text>

  <line x1="344.6" y1="150" x2="344.6" y2="190" stroke="#3b82f6" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="392" y="166" font-size="10.5" fill="#3b82f6" text-anchor="middle">80% limit (46:06)</text>

  <text x="36" y="276" font-size="12" fill="#6b7280">Reference lines = driving at a fixed fraction of every posted speed limit. The agent never ran significantly late.</text>
</svg>
