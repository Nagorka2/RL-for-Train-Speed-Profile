<svg viewBox="0 0 720 410" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="1" y="1" width="718" height="408" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="36" y="40" font-size="20" font-weight="700" fill="#111827">Best run time by agent</text>
  <text x="36" y="62" font-size="13" fill="#6b7280">Lower is better — but the run must stay under the speed limit. Trollhättan → Göteborg C (~73 km).</text>

  <!-- y axis label -->
  <text x="22" y="200" font-size="12" fill="#6b7280" transform="rotate(-90 22 200)" text-anchor="middle">minutes</text>

  <!-- gridlines (0..60 min, y = 330 - min*4.5) -->
  <g stroke="#eef2f7" stroke-width="1">
    <line x1="60" y1="330" x2="690" y2="330"/>
    <line x1="60" y1="285" x2="690" y2="285"/>
    <line x1="60" y1="240" x2="690" y2="240"/>
    <line x1="60" y1="195" x2="690" y2="195"/>
    <line x1="60" y1="150" x2="690" y2="150"/>
    <line x1="60" y1="105" x2="690" y2="105"/>
    <line x1="60" y1="60"  x2="690" y2="60"/>
  </g>
  <g font-size="11" fill="#9ca3af" text-anchor="end">
    <text x="52" y="334">0</text>
    <text x="52" y="289">10</text>
    <text x="52" y="244">20</text>
    <text x="52" y="199">30</text>
    <text x="52" y="154">40</text>
    <text x="52" y="109">50</text>
    <text x="52" y="64">60</text>
  </g>

  <!-- human baseline band 43.4..46.1 min -->
  <rect x="60" y="122.6" width="630" height="12.1" fill="#3b82f6" opacity="0.12"/>
  <line x1="60" y1="128.6" x2="690" y2="128.6" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="684" y="118" font-size="11" fill="#3b82f6" text-anchor="end">Human baseline ~43–46 min</text>

  <!-- bars -->
  <!-- v1: 39:20 = 39.33 min, h=177, top=153 (amber: overspeeding) -->
  <rect x="135" y="153" width="90" height="177" rx="4" fill="#f59e0b"/>
  <text x="180" y="143" font-size="15" font-weight="700" fill="#b45309" text-anchor="middle">39:20</text>
  <!-- v2: 58:40 = 58.67 min, h=264, top=66 -->
  <rect x="330" y="66" width="90" height="264" rx="4" fill="#94a3b8"/>
  <text x="375" y="56" font-size="15" font-weight="700" fill="#475569" text-anchor="middle">58:40</text>
  <!-- v3: 54:39 = 54.65 min, h=246, top=84 -->
  <rect x="525" y="84" width="90" height="246" rx="4" fill="#10b981"/>
  <text x="570" y="74" font-size="15" font-weight="700" fill="#047857" text-anchor="middle">54:39</text>

  <!-- axis baseline -->
  <line x1="60" y1="330" x2="690" y2="330" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- x labels -->
  <g font-size="13" fill="#374151" text-anchor="middle">
    <text x="180" y="352" font-weight="600">v1</text>
    <text x="375" y="352" font-weight="600">v2</text>
    <text x="570" y="352" font-weight="600">v3</text>
  </g>

  <text x="36" y="392" font-size="12" fill="#b45309">v1 was fastest only by exceeding speed limits (not a valid run). v3 is the best compliant result.</text>
</svg>
